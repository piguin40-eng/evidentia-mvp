services:
  - type: web
    name: ceramiq
    runtime: python
    plan: starter
    buildCommand: pip install --no-cache-dir -r requirements.txt && python -m py_compile server.py
    startCommand: python server.py
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: CERAMIQ_ENV
        value: production
