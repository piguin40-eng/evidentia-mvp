<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evidentia</title>
    <meta name="theme-color" content="#070809" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Evidentia" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest?v=20260708-stable-mobile" />
    <link rel="icon" href="./icon.svg?v=20260624-mirror-e" type="image/svg+xml" />
    <link rel="apple-touch-icon" sizes="192x192" href="./assets/icons/icon-192.png?v=20260708-stable-mobile" />
    <link rel="apple-touch-icon" sizes="512x512" href="./assets/icons/icon-512.png?v=20260708-stable-mobile" />
    <link rel="stylesheet" href="./styles.css?v=20260709-mobile-header-restore" />
    <style>
      @media (max-width: 720px) {
        html,
        body {
          width: 100%;
          max-width: 100%;
          overflow-x: hidden;
        }
        .app-topbar {
          display: grid;
          grid-template-columns: minmax(108px, auto) minmax(0, 1fr) auto;
          gap: 8px;
          align-items: center;
        }
        .brand {
          grid-column: 1;
          grid-row: 1;
        }
        .brand,
        .case-pill,
        .install-app,
        .ai-status {
          min-width: 0;
          max-width: 100%;
          margin-left: 0;
        }
        .global-search {
          grid-column: 1 / -1;
          grid-row: 3;
          min-width: 0;
        }
        .case-pill {
          grid-column: 1 / -1;
          grid-row: 2;
          width: 100%;
          justify-content: flex-start;
        }
        .site-link {
          display: inline-flex;
        }
        .site-link[href*="reset"] {
          display: none;
        }
        .ai-status {
          grid-column: 2;
          grid-row: 1;
          justify-content: center;
          white-space: nowrap;
          font-size: 11px;
        }
        .web-link {
          grid-column: 3;
          grid-row: 1;
        }
        .app-work,
        .evidentia-home,
        .evidentia-hero,
        .hero-copy,
        .hero-visual,
        .command-deck {
          min-width: 0;
        }
        .app-work {
          width: 100vw;
          max-width: 100vw;
          padding-left: 12px;
          padding-right: 12px;
          overflow-x: hidden;
        }
        .evidentia-home,
        .evidentia-hero,
        .command-deck,
        .value-strip,
        .knowledge-routing-band,
        .video-memory-band,
        .work-grid {
          width: min(300px, calc(100vw - 56px));
          max-width: min(300px, calc(100vw - 56px));
          margin-left: 0;
          margin-right: 0;
        }
        .evidentia-hero {
          display: flex;
          flex-direction: column;
          grid-template-columns: none;
          overflow: visible;
        }
        .hero-copy h1,
        .hero-claim,
        .hero-subclaim {
          display: block;
          width: min(260px, calc(100vw - 94px));
          max-width: min(260px, calc(100vw - 94px));
          white-space: normal;
          overflow-wrap: break-word;
        }
        .command-copy,
        .command-grid,
        .command-tile {
          width: 100%;
          max-width: 100%;
          min-width: 0;
        }
        .hero-visual {
          display: block;
          order: -1;
          min-height: 260px;
          aspect-ratio: 36 / 53;
          margin: 0 0 18px;
        }
      }
    </style>
  </head>
  <body data-case="" data-consent="pending">
    <header class="app-topbar">
      <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span class="brand-word">EVID&#398;NTIA</span></div>
      <button class="case-pill" id="casePill" type="button"><span class="dot"></span><span id="caseName">Sin caso activo</span></button>
      <div class="global-search">
        <input id="globalSearch" type="search" placeholder="Buscar casos, fotos, videos, PDF, notas, criterios..." />
        <kbd>⌘K</kbd>
      </div>
      <a class="install-app site-link" href="./reset.html?v=20260708-stable-mobile">Actualizar</a>
      <a class="install-app site-link web-link" href="./website.html?v=20260622-good-web-restore">Web</a>
      <button class="install-app" id="installApp" type="button">Instalar app</button>
      <div class="ai-status" id="aiStatus" data-state="idle"><span class="pulse"></span><span>Conectado a IA</span></div>
    </header>

    <nav class="app-rail" aria-label="Secciones">
      <button class="rail-item active" data-view="intake" type="button">Ingesta</button>
      <button class="rail-item" data-view="entities" type="button">Entidades</button>
      <button class="rail-item" data-view="graph" type="button">Mapa</button>
      <button class="rail-item" data-view="chat" type="button">Chat</button>
      <button class="rail-item" data-view="intelligence" type="button">Intel</button>
      <button class="rail-item" data-view="query" type="button">Buscar</button>
      <button class="rail-item" data-view="pack" type="button">Pack</button>
      <button class="rail-item" data-view="connectors" type="button">Conectar</button>
      <button class="rail-item" data-view="cases" type="button">Casos</button>
      <button class="rail-item" data-view="consent" type="button">Permiso</button>
      <button class="rail-item" data-view="storage" type="button">Datos</button>
    </nav>

    <main class="app-work" id="work" aria-live="polite"></main>

    <aside class="app-context" id="context" aria-label="Contexto del caso">
      <div class="context-head">
        <span class="eyebrow">Contexto activo</span>
        <h2>Sin caso seleccionado</h2>
      </div>
      <div id="contextBody"></div>
    </aside>

    <footer class="app-trace">
      <span>Trazabilidad: <strong id="traceCount">0</strong> fuentes</span>
      <span class="trace-sep">·</span>
      <span class="consent-badge" id="consentBadge" data-state="pending">Consentimiento pendiente</span>
      <span class="trace-sep">·</span>
      <button class="trace-log" id="agentLogBtn" type="button">Registro del agente</button>
      <span class="trace-fill"></span>
      <span id="storageStatus">Conectando...</span>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=20260709-mobile-header-restore"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js?v=20260709-mobile-header-restore")
            .then(function (registration) { registration.update().catch(function () {}); })
            .catch(function () {});
        });
      }
    </script>
  </body>
</html>
