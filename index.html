<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evidentia</title>
    <meta name="theme-color" content="#070809" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Evidentia" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest?v=20260628-mobile-app" />
    <link rel="icon" href="./icon.svg?v=20260624-mirror-e" type="image/svg+xml" />
    <link rel="apple-touch-icon" sizes="192x192" href="./assets/icons/icon-192.png?v=20260628-mobile-app" />
    <link rel="apple-touch-icon" sizes="512x512" href="./assets/icons/icon-512.png?v=20260628-mobile-app" />
    <link rel="stylesheet" href="./styles.css?v=20260629-rag-refresh" />
  </head>
  <body data-case="" data-consent="pending">
    <header class="app-topbar">
      <div class="brand"><span class="brand-mark" aria-hidden="true"></span><span class="brand-word">EVID&#398;NTIA</span></div>
      <button class="case-pill" id="casePill" type="button"><span class="dot"></span><span id="caseName">Sin caso activo</span></button>
      <div class="global-search">
        <input id="globalSearch" type="search" placeholder="Buscar casos, fotos, videos, PDF, notas, criterios..." />
        <kbd>⌘K</kbd>
      </div>
      <a class="install-app site-link" href="./reset.html?v=20260629-rag-refresh">Actualizar</a>
      <a class="install-app site-link" href="./website.html?v=20260622-good-web-restore">Web</a>
      <button class="install-app" id="installApp" type="button">Instalar app</button>
      <div class="ai-status" id="aiStatus" data-state="idle"><span class="pulse"></span><span>IA en reposo</span></div>
    </header>

    <nav class="app-rail" aria-label="Secciones">
      <button class="rail-item active" data-view="intake" type="button">Ingesta</button>
      <button class="rail-item" data-view="entities" type="button">Entidades</button>
      <button class="rail-item" data-view="graph" type="button">Mapa</button>
      <button class="rail-item" data-view="chat" type="button">Chat</button>
      <button class="rail-item" data-view="intelligence" type="button">Intel</button>
      <button class="rail-item" data-view="query" type="button">Buscar</button>
      <button class="rail-item" data-view="pack" type="button">Pack</button>
      <button class="rail-item" data-view="connectors" type="button">Conectar</button>
      <button class="rail-item" data-view="cases" type="button">Casos</button>
      <button class="rail-item" data-view="consent" type="button">Permiso</button>
      <button class="rail-item" data-view="storage" type="button">Datos</button>
    </nav>

    <main class="app-work" id="work" aria-live="polite"></main>

    <aside class="app-context" id="context" aria-label="Contexto del caso">
      <div class="context-head">
        <span class="eyebrow">Contexto activo</span>
        <h2>Sin caso seleccionado</h2>
      </div>
      <div id="contextBody"></div>
    </aside>

    <footer class="app-trace">
      <span>Trazabilidad: <strong id="traceCount">0</strong> fuentes</span>
      <span class="trace-sep">·</span>
      <span class="consent-badge" id="consentBadge" data-state="pending">Consentimiento pendiente</span>
      <span class="trace-sep">·</span>
      <button class="trace-log" id="agentLogBtn" type="button">Registro del agente</button>
      <span class="trace-fill"></span>
      <span id="storageStatus">Conectando...</span>
    </footer>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=20260629-rag-refresh"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js?v=20260629-rag-refresh")
            .then(function (registration) { registration.update().catch(function () {}); })
            .catch(function () {});
        });
      }
    </script>
  </body>
</html>
